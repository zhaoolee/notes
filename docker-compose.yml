services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "18080:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      IMAGE_STORAGE_DIR: /app/storage/images
    volumes:
      - ./storage/images:/app/storage/images
